services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petrel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d petrel"]
      interval: 5s
      timeout: 5s
      retries: 10

  panel:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/petrel
      ORIGIN: http://localhost:3000
      SEED_DEFAULT_ADMIN: "true"
      ADMIN_EMAILS: admin@admin.com
    depends_on:
      postgres:
        condition: service_healthy

  wings:
    # Pin to a specific release tag in production (e.g. ghcr.io/ocelik94/petrel-wings:v1.0.0).
    image: ghcr.io/ocelik94/petrel-wings:latest
    restart: unless-stopped
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./ops/wings-config.yml:/etc/wings/config.yml:ro
    depends_on:
      - panel

volumes:
  pgdata:
